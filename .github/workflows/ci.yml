name: EventX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci
      - name: Lint backend
        run: npm run lint --workspace eventx-server
      - name: Lint frontend
        run: npm run lint --workspace eventx-client
      - name: Test backend
        run: npm test --workspace eventx-server
      - name: Test frontend
        run: npm test --workspace eventx-client
      - name: Build frontend
        run: npm run build --workspace eventx-client

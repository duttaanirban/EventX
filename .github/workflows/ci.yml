name: EventX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install backend
        run: npm ci
        working-directory: server
      - name: Install frontend
        run: npm ci
        working-directory: client
      - name: Lint backend
        run: npm run lint
        working-directory: server
      - name: Test backend
        run: npm test
        working-directory: server
      - name: Lint frontend
        run: npm run lint
        working-directory: client
      - name: Test frontend
        run: npm test
        working-directory: client
      - name: Build frontend
        run: npm run build
        working-directory: client
